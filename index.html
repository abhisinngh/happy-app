<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Mood Space Premium ✨</title>

<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

</head>

<body>

<!-- BACKGROUND MUSIC -->
<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3">
</audio>

<!-- NAME SCREEN -->
<div id="namePage" class="card">
<h2>✨ Mood Space</h2>
<p>Enter your name</p>
<input id="username" placeholder="Your name">
<button onclick="startApp()">Enter</button>
</div>

<!-- MOOD SCREEN -->
<div id="moodPage" class="card hidden">
<h2 id="welcome"></h2>
<p>Select your mood</p>

<button onclick="setMood('happy')">😊 Happy</button>
<button onclick="setMood('angry')">😡 Angry</button>
<button onclick="setMood('sad')">😢 Sad</button>
</div>

<!-- OPTIONS -->
<div id="actionPage" class="card hidden">

<h2 id="moodTitle"></h2>
<div id="actions"></div>

<p id="quote" class="quote"></p>

</div>

<script>

/* ---------- START ---------- */
function startApp(){

let name=username.value || "Friend";
welcome.innerText="Hello "+name+" 👋";

document.getElementById("music").play();

namePage.classList.add("hidden");
moodPage.classList.remove("hidden");

startParticles();
}

/* ---------- MOOD ---------- */
function setMood(mood){

moodPage.classList.add("hidden");
actionPage.classList.remove("hidden");
actions.innerHTML="";

if(mood==="happy"){
moodTitle.innerText="You're Happy 😄";

addBtn("🤗 Hug Abhishek",hug);
addBtn("💰 Send Money",()=>popup("Abhishek feels rich 😄"));
addBtn("🎁 Send Gift",()=>popup("Gift accepted 🎁"));

quote.innerText="Happiness grows when shared ✨";
document.body.className="happy";
}

if(mood==="angry"){
moodTitle.innerText="You're Angry 😡";

addBtn("👋 Slap Abhishek",slap);
addBtn("🔫 Shoot",()=>popup("Pew pew 😂"));
addBtn("🪟 Throw Out",()=>popup("Dramatic exit 🪟"));

quote.innerText="Pause. Breathe. Reset 🌪️";
document.body.className="angry";
}

if(mood==="sad"){
moodTitle.innerText="You're Sad 😢";

addBtn("🤗 Hug (50% OFF)",hug);

quote.innerText="You are not alone 💙";
document.body.className="sad";
}
}

/* ---------- BUTTON BUILDER ---------- */
function addBtn(text,action){
let b=document.createElement("button");
b.innerText=text;
b.onclick=action;
actions.appendChild(b);
}

/* ---------- ACTIONS ---------- */
function hug(){
popup("🤗 Warm hug from Abhishek!");
hearts();
}

function slap(){
document.body.classList.add("shake");
setTimeout(()=>document.body.classList.remove("shake"),400);
popup("😜 Playful slap!");
}

function popup(text){
alert(text);
}

/* ---------- PARTICLES ---------- */
function startParticles(){
setInterval(()=>{
let p=document.createElement("div");
p.className="particle";
p.innerText="✨";
p.style.left=Math.random()*100+"vw";
p.style.fontSize=(12+Math.random()*20)+"px";
document.body.appendChild(p);
setTimeout(()=>p.remove(),8000);
},900);
}

/* ---------- HEARTS ---------- */
function hearts(){
for(let i=0;i<10;i++){
let h=document.createElement("div");
h.className="particle";
h.innerText="❤️";
h.style.left=Math.random()*100+"vw";
document.body.appendChild(h);
setTimeout(()=>h.remove(),6000);
}
}

/* ---------- INSTALLABLE APP ---------- */
if('serviceWorker' in navigator){
navigator.serviceWorker.register('sw.js').catch(()=>{});
}

</script>

</body>
</html>
